.cat-label{flex:1;color:#333;line-height:1.2}
.cat-count{font-size:10px;color:#aaa}

.detail-name{font-family:'DM Serif Display',serif;font-size:17px;color:#1a1a1a;margin-bottom:4px}

.hint-box strong{color:#666}

#map-container{flex:1;position:relative}
#map{width:100%;height:100%}

.custom-marker{border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);transition:transform .2s}

// ============================================================================
// APP STATE
// ============================================================================
let selectedCat = null;
let selectedSite = null;

// ============================================================================
// MAP
// ============================================================================
const map = L.map('map',{zoomControl:true}).setView([44,5],4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom:19
}).addTo(map);

const markers = {};
const markerLayer = L.layerGroup().addTo(map);

SITES.forEach((s,i) => {
  const c = CATEGORIES[s.cat]?.color || '#888';
  const size = 12;
  const icon = L.divIcon({
    className:'',
    html:`<div class="custom-marker" data-idx="${i}" style="width:${size}px;height:${size}px;background:${c}"></div>`,
    iconSize:[size,size],iconAnchor:[size/2,size/2]
  });
  const m = L.marker([s.lat,s.lng],{icon}).addTo(markerLayer);
  m.on('click',()=>selectSite(i));
  m.on('mouseover',()=>{
    m.bindPopup(`<div class="popup-title">${s.n}</div><div class="popup-region">${s.r}</div><div class="popup-row"><strong>Category:</strong> ${s.cat}</div><div class="popup-row"><strong>Terroir:</strong> ${s.t}</div><div class="popup-row"><strong>Producers:</strong> ${s.p}</div>`).openPopup();
  });
  markers[i] = m;
});

// ============================================================================
// CATEGORIES
// ============================================================================
const catList = document.getElementById('cat-list');
Object.entries(CATEGORIES).forEach(([name,meta]) => {
  const count = SITES.filter(s=>s.cat===name).length;
  const el = document.createElement('div');
  el.className='cat-item';el.dataset.cat=name;
  el.style.setProperty('--cc',meta.color);el.style.setProperty('--cbg',meta.bg);
  el.innerHTML=`<span class="cat-dot" style="background:${meta.color}"></span><span class="cat-label">${name}</span><span class="cat-count">${count}</span>`;
  el.addEventListener('click',()=>{
    if(selectedCat===name){selectedCat=null;}else{selectedCat=name;selectedSite=null;}
    updateAll();
  });
  catList.appendChild(el);
});

// ============================================================================
// SEARCH
// ============================================================================
const searchInput=document.getElementById('search-input');
const searchResults=document.getElementById('search-results');
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.toLowerCase();
  if(q.length<2){searchResults.style.display='none';return;}
  const matches=SITES.map((s,i)=>({...s,idx:i})).filter(s=>s.n.toLowerCase().includes(q)||s.r.toLowerCase().includes(q)||s.p.toLowerCase().includes(q)).slice(0,10);
  if(!matches.length){searchResults.style.display='none';return;}
  searchResults.innerHTML='';searchResults.style.display='block';
  matches.forEach(s=>{
    const el=document.createElement('div');el.className='sr-item';
    el.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${CATEGORIES[s.cat]?.color};flex-shrink:0"></span><span style="flex:1">${s.n}</span><span style="font-size:10px;color:#aaa">${s.cat}</span>`;
    el.addEventListener('click',()=>{selectSite(s.idx);searchInput.value='';searchResults.style.display='none';});
    searchResults.appendChild(el);
  });
});

// ============================================================================
// RESET
// ============================================================================
const resetBar=document.getElementById('reset-bar');
const filterLabel=document.getElementById('filter-label');
document.getElementById('reset-btn').addEventListener('click',resetAll);
document.addEventListener('keydown',e=>{if(e.key==='Escape')resetAll();});

function resetAll(){selectedCat=null;selectedSite=null;updateAll();map.flyTo([44,5],4,{duration:0.8});}

// ============================================================================
// SELECT SITE
// ============================================================================
function selectSite(idx){
  selectedSite=idx;
  selectedCat=null;
  updateAll();
  const s=SITES[idx];
  map.flyTo([s.lat,s.lng],10,{duration:0.8});
}

// ============================================================================
// UPDATE ALL
// ============================================================================
function updateAll(){
  // Categories
  document.querySelectorAll('.cat-item').forEach(el=>el.classList.toggle('active',selectedCat===el.dataset.cat));

  // Reset bar
  if(selectedSite!==null){
    filterLabel.textContent=`Viewing: ${SITES[selectedSite].n}`;
    resetBar.classList.add('active');
  }else if(selectedCat){
    filterLabel.textContent=`Category: ${selectedCat}`;
    resetBar.classList.add('active');
  }else{
    resetBar.classList.remove('active');
  }

  // Markers
  SITES.forEach((s,i)=>{
    const el=markers[i].getElement();
    if(!el)return;
    const dot=el.querySelector('.custom-marker');
    if(!dot)return;
    dot.classList.remove('dimmed','highlighted');
    if(selectedSite!==null){
      if(i===selectedSite)dot.classList.add('highlighted');
      else if(SITES[i].cat===SITES[selectedSite].cat){}
      else dot.classList.add('dimmed');
    }else if(selectedCat){
      if(s.cat!==selectedCat)dot.classList.add('dimmed');
    }
  });

  // Fit bounds for category
  if(selectedCat && selectedSite===null){
    const catSites=SITES.filter(s=>s.cat===selectedCat);
    if(catSites.length>0){
      const bounds=L.latLngBounds(catSites.map(s=>[s.lat,s.lng]));
      map.flyToBounds(bounds.pad(0.2),{duration:0.8});
    }
  }

  renderDetail();
}

// ============================================================================
// DETAIL PANEL
// ============================================================================
function renderDetail(){
  const det=document.getElementById('detail');

  if(selectedSite!==null){
    const s=SITES[selectedSite];
    const sameCat=SITES.map((ss,i)=>({...ss,idx:i})).filter(ss=>ss.cat===s.cat && ss.idx!==selectedSite);
    let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:14px;height:14px;border-radius:50%;background:${CATEGORIES[s.cat]?.color}"></span>
      <div class="detail-name">${s.n}</div></div>
      <div class="detail-region">${s.r}</div>
      <div class="detail-row"><span class="detail-label">Category</span><span class="detail-val">${s.cat}</span></div>
      <div class="detail-row"><span class="detail-label">Terroir</span><span class="detail-val">${s.t}</span></div>
      <div class="detail-row"><span class="detail-label">Producers</span><span class="detail-val">${s.p}</span></div>`;
    if(sameCat.length>0){
      html+=`<div class="section-label" style="margin-top:14px">Other ${s.cat} Sites (${sameCat.length})</div>`;
      sameCat.forEach(ss=>{
        html+=`<div class="site-item" data-idx="${ss.idx}"><span class="site-dot" style="background:${CATEGORIES[ss.cat]?.color}"></span><span class="site-name">${ss.n}</span><span class="site-region">${ss.r}</span></div>`;
      });
    }
    det.innerHTML=html;
    det.querySelectorAll('.site-item[data-idx]').forEach(el=>{
      el.addEventListener('click',()=>selectSite(+el.dataset.idx));
    });

  }else if(selectedCat){
    const catSites=SITES.map((s,i)=>({...s,idx:i})).filter(s=>s.cat===selectedCat);
    const m=CATEGORIES[selectedCat];
    let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:12px;height:12px;border-radius:3px;background:${m.color}"></span>
      <div class="detail-name" style="font-size:15px">${selectedCat}</div></div>
      <p style="font-size:11px;color:#888;margin-bottom:10px">${catSites.length} vineyard sites</p>`;
    catSites.forEach(s=>{
      html+=`<div class="site-item" data-idx="${s.idx}"><span class="site-dot" style="background:${m.color}"></span><span class="site-name">${s.n}</span><span class="site-region">${s.r}</span></div>`;
    });
    det.innerHTML=html;
    det.querySelectorAll('.site-item[data-idx]').forEach(el=>{
      el.addEventListener('click',()=>selectSite(+el.dataset.idx));
    });

  }else{
    const total=SITES.length;
    const cats=Object.keys(CATEGORIES).length;
    let html=`<div class="section-label">Atlas Overview</div>
      <p style="font-size:12px;color:#555;margin-bottom:10px;line-height:1.55"><strong style="color:#7B2D26">${total}</strong> vineyard sites across <strong style="color:#7B2D26">${cats}</strong> grape categories, spanning the world's greatest terroirs from the blue slate of the Mosel to the volcanic schist of Etna.</p>
      <p style="font-size:12px;color:#555;margin-bottom:10px;line-height:1.55">Each site is documented with its terroir, key producers, and signature character. Use the categories above to filter the map, or search by vineyard, region, or producer name.</p>
      <div class="hint-box"><strong>How to use</strong><br>Click a category above to filter the map.<br>Click a pin for vineyard details.<br>Search by vineyard, region, or producer.<br>Press <kbd>Esc</kbd> or ✕ Reset to return.<br>Scroll to zoom · drag to pan.</div>`;
    det.innerHTML=html;
  }
}

renderDetail();
</script>
